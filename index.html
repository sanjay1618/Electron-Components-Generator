<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Academic Affairs | Code Generator</title>
    <link rel="stylesheet" href="./src/css/app-styles.css">
</head>
<body>
    <div id="app-shell">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Components</h2>
            </div>
            
            <nav id="component-list">
                </nav>

            <div class="sidebar-footer">
                <button id="create-meta-btn" class="secondary-btn">+ Meta Builder</button>
            </div>
        </aside>

        <main id="editor-container">
            <header id="view-header">
                <h1 id="active-component-name">Select a Component</h1>
            </header>

            <section id="dynamic-viewport">
                <div id="form-insertion-point">
                    <p class="placeholder-text">Choose a component from the left to start generating code.</p>
                </div>
            </section>

            <footer id="action-bar">
                <button id="generate-save-btn" class="primary-btn" disabled>
                    Generate & Save HTML
                </button>
            </footer>
        </main>
    </div>

    <script type="module" src="./src/js/renderer.js"></script>
</body>
</html>
